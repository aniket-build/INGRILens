# Netlify configuration for Ingredient Lens
# Extends function timeout from default 10s to 26s (max on free plan)
# This is critical because AI image analysis can take 15-25 seconds

[functions]
  # Increase timeout for AI analysis
  node_bundler = "esbuild"

[functions."analyze"]
  # Extend timeout to 26 seconds (Netlify free plan max)
  timeout = 26

# Optional: Headers for better PWA performance
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
